
services:
  # CONTAINER 1: Primary Database (Teachers)
  db-primary:
    image: postgres:latest
    container_name: postgres-primary
    environment:
      POSTGRES_PASSWORD: root
      POSTGRES_USER: postgres
      POSTGRES_DB: db_one # Automatically creates the database
    ports:
      - "5431:5432" # Exposed to your machine on 5431
    volumes:
      - ./init-db1.sql:/docker-entrypoint-initdb.d/init.sql
      - db1-data:/var/lib/postgresql
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d db_one"]
      interval: 10s
      timeout: 5s
      retries: 5

  # CONTAINER 2: Secondary Database (Students)
  db-secondary:
    image: postgres:latest
    container_name: postgres-secondary
    environment:
      POSTGRES_PASSWORD: root
      POSTGRES_USER: postgres
      POSTGRES_DB: db_two # Automatically creates the database
    ports:
      - "5432:5432" # Exposed to your machine on 5432
    volumes:
      - ./init-db2.sql:/docker-entrypoint-initdb.d/init.sql
      - db2-data:/var/lib/postgresql
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d db_two"]
      interval: 10s
      timeout: 5s
      retries: 5

  # CONTAINER 3: Your Spring Boot Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spring-boot-app
    ports:
      - "9001:9001"
    environment:
      # Notice the URLs now point to the separate container names!
      - DB1_URL=jdbc:postgresql://db-primary:5432/db_one
      - DB2_URL=jdbc:postgresql://db-secondary:5432/db_two
    depends_on:
      db-primary:
        condition: service_healthy
      db-secondary:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  db1-data:
    driver: local
  db2-data:
    driver: local